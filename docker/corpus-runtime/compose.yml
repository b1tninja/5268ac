x-corpus-runtime: &corpus-runtime
  image: 5268ac-corpus-runtime
  build:
    context: ../..
    dockerfile: docker/corpus-runtime/Dockerfile
    target: runtime
  working_dir: /work
  volumes:
    - ../..:/work
    - ../../gateway.c01.sbcglobal.net:/work/gateway.c01.sbcglobal.net
    - ../../work_corpus:/work/work_corpus

services:
  corpus:
    <<: *corpus-runtime
    command: ["--help"]

  mirror-pkgstreams:
    <<: *corpus-runtime
    command:
      - mirror-pkgstreams
      - --pkgstreams
      - /work/pkgstreams
      - --out
      - /work/gateway.c01.sbcglobal.net
      - --jsonl

  index-pkgstreams:
    <<: *corpus-runtime
    command:
      - --build-index
      - --max-file-mb
      - "0"
      - --max-strings-per-file
      - "2000"
      - --symtab
      - --dwarf
      - --jobs
      - "8"
      - --db
      - /work/work_corpus/corpus_index.sqlite
      - --pkgstream-root
      - /work/gateway.c01.sbcglobal.net
      - --pkgstream-work
      - /work/work_corpus/pkgstream_corpus_by_version
      - --pkgstream-report-json
      - /work/work_corpus/gateway_pkgstream_index_report.json
      - --sbom-dir
      - /work/work_corpus/sbom
      - --sbom-source
      - auto
      - --sbom
